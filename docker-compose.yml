# Usage:
#   1. Provide credentials:  copy .env.docker.example to .env
#   2. Build:                 docker compose build
#   3. Run smoke suite:       docker compose run --rm pytest -m smoke
#   4. Run full suite:        docker compose run --rm pytest

services:
  pytest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # To mirror the CI matrix, build with
        # `docker compose build --build-arg PLAYWRIGHT_BROWSERS="chromium firefox webkit"`.
        PLAYWRIGHT_BROWSERS: "chromium"
    image: saucedemo-tests:latest
    container_name: saucedemo-tests

    env_file:
      - path: .env
        required: false

    environment:
      - PYTHONUNBUFFERED=1

    # Avoid Chromium crashes under parallel test load.
    shm_size: "2gb"

    # Persist traces, screenshots, video, and Allure results on the host.
    volumes:
      - ./test-results:/app/test-results
      - ./allure-results:/app/allure-results

    # Arguments after the service name override this default.
    command: [ "-n", "auto" ]
