name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Nightly run at 03:00 UTC (00:00 America/Argentina/Buenos_Aires).
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref/PR to conserve CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Ruff & Mypy)
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install the project with dev dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy .

  test:
    name: Tests (${{ matrix.browser }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJSON(github.event_name == 'pull_request' && '["chromium"]' || '["chromium","firefox","webkit"]') }}
    env:
      SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install the project (uv sync)
        run: uv sync --frozen

      - name: Install Playwright browser
        run: uv run playwright install --with-deps ${{ matrix.browser }}

      - name: Run full test suite (parallel via pytest-xdist)
        run: uv run pytest -n auto --browser ${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}

      - name: Upload test artifacts (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/${{ matrix.browser }}/
          retention-days: 14
