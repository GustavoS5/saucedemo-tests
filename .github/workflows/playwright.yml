name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly run at 03:00 UTC (00:00 America/Argentina/Buenos_Aires).
    - cron: '0 3 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install the project (uv sync)
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run tests (parallel via pytest-xdist)
        run: uv run pytest -n auto --alluredir=allure-results

      - name: Upload test artifacts (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14
